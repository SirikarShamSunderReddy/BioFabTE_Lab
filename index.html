<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b1220;
    color: #ffffff;
    font-family: Arial, sans-serif;
  }

  .loading {
    font-size: 2.5rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Animate each letter */
  .loading span {
    display: inline-block;
    animation: bounce 1.2s infinite ease-in-out;
  }

  .loading span:nth-child(1) { animation-delay: 0s; }
  .loading span:nth-child(2) { animation-delay: 0.1s; }
  .loading span:nth-child(3) { animation-delay: 0.2s; }
  .loading span:nth-child(4) { animation-delay: 0.3s; }
  .loading span:nth-child(5) { animation-delay: 0.4s; }
  .loading span:nth-child(6) { animation-delay: 0.5s; }
  .loading span:nth-child(7) { animation-delay: 0.6s; }

  @keyframes bounce {
    0%, 100% {
      transform: translateY(0);
      opacity: 0.6;
    }
    50% {
      transform: translateY(-10px);
      opacity: 1;
    }
  }

  /* Dots animation */
  .dots::after {
    content: "";
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ""; }
    25%  { content: "."; }
    50%  { content: ".."; }
    75%  { content: "..."; }
    100% { content: ""; }
  }
</style>

<script>
  setTimeout(function() {
    window.location.href = "./biofab/html/index.html";
  }, 1500);
</script>

</head>

<body>
  <div class="loading">
    <span>L</span>
    <span>o</span>
    <span>a</span>
    <span>d</span>
    <span>i</span>
    <span>n</span>
    <span>g</span>
    <span class="dots"></span>
  </div>
</body>
</html>
